<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRIS API</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #f8fafc;
        color: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 48px 56px;
        text-align: center;
        max-width: 480px;
        width: 90%;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #dcfce7;
        color: #166534;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        padding: 4px 12px;
        border-radius: 9999px;
        margin-bottom: 20px;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: #22c55e;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 8px;
      }
      p {
        color: #64748b;
        font-size: 0.95rem;
        margin-bottom: 28px;
      }
      .meta {
        font-size: 0.8rem;
        color: #94a3b8;
        border-top: 1px solid #f1f5f9;
        padding-top: 20px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"><span class="dot"></span> Server Online</div>
      <h1>HRIS API</h1>
      <p>Human Resource Information System REST API is up and running.</p>
      <div class="meta" th:text="${timestamp}"></div>
    </div>
  </body>
</html>
